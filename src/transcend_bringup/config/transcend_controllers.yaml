# ================================================================
#  transcend_controllers.yaml
#  Wheel dimensions: wheel_radius=0.022m, wheel_separation=0.158m
# ================================================================

controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:

    left_wheel_names:  ["base_front_left_wheel_joint",  "base_rear_left_wheel_joint"]
    right_wheel_names: ["base_front_right_wheel_joint", "base_rear_right_wheel_joint"]

    wheel_separation: 0.158
    wheel_radius:     0.022

    # ---- JAZZY FIX: accept plain Twist on /cmd_vel ----
    # In Jazzy, diff_drive_controller defaults to TwistStamped.
    # This makes it accept the standard Twist that teleop and Nav2 publish.
    use_stamped_vel: false

    linear.x.max_velocity:  0.25
    linear.x.min_velocity: -0.25
    angular.z.max_velocity:  2.0
    angular.z.min_velocity: -2.0

    linear.x.max_acceleration:  0.5
    linear.x.min_acceleration: -0.5
    angular.z.max_acceleration:  1.5
    angular.z.min_acceleration: -1.5

    open_loop:      false
    odom_frame_id:  odom
    base_frame_id:  base_footprint
    enable_odom_tf: true

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    cmd_vel_topic:    /cmd_vel
    publish_rate:     50.0
    cmd_vel_timeout:  0.5